name: Build (macOS)

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          set -euxo pipefail
          ls -1 /Applications | grep -E '^Xcode' || true
          CANDIDATE="$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -n 1 || true)"
          if [ -n "${CANDIDATE}" ] && [ -d "${CANDIDATE}/Contents/Developer" ]; then
            echo "Using ${CANDIDATE}"
            echo "DEVELOPER_DIR=${CANDIDATE}/Contents/Developer" >> "$GITHUB_ENV"
          fi

      - name: Show Xcode Version
        run: xcodebuild -version

      - name: Build
        run: |
          set -euxo pipefail
          xcodebuild \
            -project "Whisky.xcodeproj" \
            -scheme "Whisky" \
            -configuration Release \
            -destination 'platform=macOS' \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

      - name: Package
        run: |
          set -euxo pipefail
          APP="build/DerivedData/Build/Products/Release/Whisky.app"
          test -d "$APP"
          ditto -c -k --sequesterRsrc --keepParent "$APP" "Whisky.app.zip"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Whisky.app
          path: Whisky.app.zip
